aid: cloudflare-queues
name: Cloudflare Queues
description: Cloudflare Queues is a flexible, scalable message queue service built
  into the Cloudflare Workers ecosystem. It provides guaranteed message delivery with
  a REST API for creating and managing queues, sending individual or batched messages,
  configuring push-based Worker consumers and HTTP pull consumers, managing dead letter
  queues, and monitoring queue metrics. Queues supports delivery delays, message retention
  up to 14 days, throughput up to 5,000 messages per second per queue, and event
  subscriptions for reactive workflows.
